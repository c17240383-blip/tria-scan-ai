name: Compilar y publicar TRIA Scan AI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Activar soporte web
        run: flutter config --enable-web

      - name: Descargar dependencias del proyecto
        run: flutter pub get

      - name: Compilar version web
        run: flutter build web --release --base-href "/tria-scan-ai/"

      - name: Preparar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir el resultado compilado
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
